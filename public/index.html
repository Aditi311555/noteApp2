<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(90deg, #ff7a18, #ffb347);
      color: white;
      padding: 16px 32px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    header h1 { font-size: 22px; }

    .container {
      max-width: 900px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .form-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .form-card h2 {
      margin-bottom: 16px;
      font-size: 16px;
      color: #5a3ec8;
    }

    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      transition: 0.2s;
    }

    input:focus, textarea:focus {
      border-color: #764ba2;
      outline: none;
      box-shadow: 0 0 5px rgba(118,75,162,0.4);
    }

    textarea { height: 80px; resize: vertical; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    .btn-primary {
      background: linear-gradient(90deg, #36d1dc, #5b86e5);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(90deg, #ff416c, #ff4b2b);
      color: white;
    }

    .btn-edit {
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: white;
    }

    #cancel-btn {
      background: #f1f1f1;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .note-card {
      background: linear-gradient(135deg, #ffffff, #f8f9ff);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      transition: 0.2s;
    }

    .note-card:hover {
      transform: translateY(-4px);
    }

    .note-card h3 {
      font-size: 15px;
      color: #4b2bbd;
      margin-bottom: 8px;
    }

    .note-card p {
      font-size: 13px;
      color: #555;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .note-meta {
      font-size: 11px;
      color: #999;
      margin-bottom: 12px;
    }

    .note-actions {
      display: flex;
      gap: 8px;
    }

    .empty {
      text-align: center;
      color: #eee;
      padding: 48px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header><h1>📝 Notes App</h1></header>
  <div class="container">
    <div class="form-card">
      <h2 id="form-title">Add New Note</h2>
      <input type="hidden" id="edit-id">
      <input type="text" id="note-title" placeholder="Title">
      <textarea id="note-content" placeholder="Content..."></textarea>
      <button class="btn btn-primary" onclick="saveNote()">Save Note</button>
      <button class="btn" id="cancel-btn" style="display:none;margin-left:8px;background:#eee" onclick="cancelEdit()">Cancel</button>
    </div>
    <div id="notes-container"><div class="empty">No notes yet. Create your first note above!</div></div>
  </div>

  <script>
    async function loadNotes() {
      const res = await fetch('/api/notes');
      const json = await res.json();
      const c = document.getElementById('notes-container');
      if (!json.data.length) { c.innerHTML = '<div class="empty">No notes yet. Create your first note above!</div>'; return; }
      c.innerHTML = '<div class="notes-grid">' + json.data.map(n => `
        <div class="note-card">
          <h3>${esc(n.title)}</h3>
          <p>${esc(n.content)}</p>
          <div class="note-meta">Created: ${new Date(n.createdAt).toLocaleString()}</div>
          <div class="note-actions">
            <button class="btn btn-edit" onclick="editNote(${n.id},'${esc(n.title)}','${esc(n.content)}')">Edit</button>
            <button class="btn btn-danger" onclick="deleteNote(${n.id})">Delete</button>
          </div>
        </div>`).join('') + '</div>';
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    async function saveNote() {
      const id = document.getElementById('edit-id').value;
      const title = document.getElementById('note-title').value.trim();
      const content = document.getElementById('note-content').value.trim();
      if (!title || !content) return alert('Please fill in both fields.');
      const url = id ? `/api/notes/${id}` : '/api/notes';
      const method = id ? 'PUT' : 'POST';
      await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify({title, content}) });
      cancelEdit(); loadNotes();
    }

    function editNote(id, title, content) {
      document.getElementById('edit-id').value = id;
      document.getElementById('note-title').value = title;
      document.getElementById('note-content').value = content;
      document.getElementById('form-title').textContent = 'Edit Note';
      document.getElementById('cancel-btn').style.display = 'inline-block';
    }

    function cancelEdit() {
      document.getElementById('edit-id').value = '';
      document.getElementById('note-title').value = '';
      document.getElementById('note-content').value = '';
      document.getElementById('form-title').textContent = 'Add New Note';
      document.getElementById('cancel-btn').style.display = 'none';
    }

    async function deleteNote(id) {
      if (!confirm('Delete this note?')) return;
      await fetch(`/api/notes/${id}`, { method: 'DELETE' });
      loadNotes();
    }

    loadNotes();
  </script>
</body>
</html>
